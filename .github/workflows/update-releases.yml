name: Update releases

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-releases

jobs:
  update:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update packages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/update-releases.sh
      - name: Validate
        run: |
          ruby -c swift-sh.rb
          brew style Casks/package-manager-manager.rb
          git diff --check
      - name: Commit updates
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add git-cryobank.rb swift-sh.rb Casks/package-manager-manager.rb
          git commit -m "Update Homebrew packages"
          git push
